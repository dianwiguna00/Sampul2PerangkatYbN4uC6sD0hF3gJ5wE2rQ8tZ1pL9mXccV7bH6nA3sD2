<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu Utama</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    flex-direction:column;
}

.header{
    color:#fff;
    text-align:center;
    padding:20px 10px;
}

.header h1{
    font-size:30px;
}

.menu{
    flex:1;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    padding:14px;
}

.menu a{
    text-decoration:none;
}

.card{
    width:100%;
    min-height:160px;
    border-radius:22px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:15px;
    box-shadow:0 8px 18px rgba(0,0,0,.25);
    transition:.2s;
}

.card:active{
    transform:scale(.97);
}

.icon{
    font-size:48px;
    margin-bottom:12px;
}

.title{
    font-size:20px;
    font-weight:bold;
    line-height:1.3;
}

.absensi{background:#16a34a;}
.terlambat{background:#f97316;}
.nilai{background:#9333ea;}
.observasi{background:#dc2626;}

.footer{
    color:#fff;
    text-align:center;
    font-size:13px;
    padding:12px;
}

/* Tablet */
@media (min-width:768px){
    .menu{
        grid-template-columns:repeat(4,1fr);
    }

    .card{
        min-height:180px;
    }
}

/* HP kecil */
@media (max-width:400px){

    .header h1{
        font-size:24px;
    }

    .icon{
        font-size:40px;
    }

    .title{
        font-size:17px;
    }

    .card{
        min-height:140px;
    }
}

</style>
</head>

<body>

<div class="header">
    <h1>PERANGKAT KBM</h1>
</div>

<div class="menu">

<a href="https://dianwiguna00.github.io/AbsenSiswa1/">

<div class="icon">📋</div>
<div class="title">ABSENSI</div>
</div>
